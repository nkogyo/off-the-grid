name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # ← allows pipeline to write to repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0     # ← fetches full history

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Deploy to Firebase
        if: success()
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Log failed build to pipeline-log.md
        if: failure()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull origin main --no-rebase
          echo "" >> pipeline-log.md
          echo "---" >> pipeline-log.md
          echo "[FAILED] $(date '+%Y-%m-%d %H:%M:%S UTC')" >> pipeline-log.md
          echo "  Author  : ${{ github.actor }}" >> pipeline-log.md
          echo "  Branch  : ${{ github.ref_name }}" >> pipeline-log.md
          echo "  Commit  : ${{ github.sha }}" >> pipeline-log.md
          echo "  Message : ${{ github.event.head_commit.message }}" >> pipeline-log.md
          echo "  Status  : Build failed — deploy blocked" >> pipeline-log.md
          git add pipeline-log.md
          git commit -m "ci: log failed pipeline run"
          git push
